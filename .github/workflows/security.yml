name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  gradle-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle wrapper
        uses: gradle/actions/setup-gradle@v6

      - name: Build (validates deps resolution)
        run: ./gradlew --no-daemon build

      - name: Inspect dependencies
        run: ./gradlew --no-daemon dependencies --configuration runtimeClasspath > deps.txt && head -100 deps.txt

      # Note: OWASP dependency-check requires NVD API key and is heavy in CI.
      # We rely on automatic Dependabot alerts (enabled per-repo via GitHub UI)
      # for transitive vulnerability tracking. Build success guarantees deps resolve cleanly.
